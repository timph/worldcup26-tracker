    <script>
        function formatUserTime(utcString) {
            if (!utcString) return "";
            try {
                const date = new Date(utcString);
                // Extract formatted localized time (e.g., 3:00 PM)
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } catch (e) {
                return "";
            }
        }

        function formatUserDateShift(utcString, originalDateStr) {
            if (!utcString) return originalDateStr;
            try {
                const utcDate = new Date(utcString);
                // Check if timezone conversion shifts the game day
                const options = { month: 'short', day: 'numeric', year: 'numeric' };
                const formattedDate = utcDate.toLocaleDateString([], options);
                
                // If formatted date differs significantly from the scheduled date, display it
                const shortOriginal = new Date(originalDateStr).toLocaleDateString([], { month: 'short', day: 'numeric' });
                const shortFormatted = utcDate.toLocaleDateString([], { month: 'short', day: 'numeric' });
                
                if (shortOriginal !== shortFormatted) {
                    return `${shortFormatted} (shifted)`;
                }
                return originalDateStr;
            } catch (e) {
                return originalDateStr;
            }
        }

        function initTabs() {
            const tabsContainer = document.getElementById("dateTabs");
            tabsContainer.innerHTML = "";
            availableDates.forEach(date => {
                const isSelected = date === selectedDate;
                const tab = document.createElement("button");
                tab.className = `px-4 py-2.5 rounded-xl font-bold text-xs whitespace-nowrap transition border ${
                    isSelected 
                        ? "bg-cupGold text-darkBg border-cupGold shadow-lg shadow-yellow-600/10" 
                        : "bg-cardBg hover:bg-gray-800 text-gray-300 border-gray-800"
                }`;
                tab.innerText = date;
                tab.onclick = () => {
                    selectedDate = date;
                    initTabs();
                    renderMatches();
                };
                tabsContainer.appendChild(tab);
            });
        }

        function adjustPrediction(fixtureId, teamType, change) {
            const fx = fixtures.find(f => f.id === fixtureId);
            if (fx && fx.status === 'finished') return;

            if (!predictions[fixtureId]) {
                predictions[fixtureId] = {
                    homeScore: fx.homeScore !== null ? fx.homeScore : 0,
                    awayScore: fx.awayScore !== null ? fx.awayScore : 0
                };
            }

            if (teamType === 'home') {
                predictions[fixtureId].homeScore = Math.max(0, predictions[fixtureId].homeScore + change);
            } else {
                predictions[fixtureId].awayScore = Math.max(0, predictions[fixtureId].awayScore + change);
            }

            recalculateStandings();
            renderMatches();
        }

        function clearSinglePrediction(fixtureId) {
            if (predictions[fixtureId]) {
                delete predictions[fixtureId];
                recalculateStandings();
                renderMatches();
            }
        }

        function resetAllPredictions() {
            predictions = {};
            recalculateStandings();
            renderMatches();
        }

        function renderMatches() {
            const container = document.getElementById("matchContainer");
            container.innerHTML = "";

            const filtered = fixtures.filter(f => f.date === selectedDate);

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-gray-500 py-12">No fixtures listed for ${selectedDate}.</div>`;
                return;
            }

            filtered.forEach(match => {
                const homeTeamObj = TEAMS[match.home];
                const awayTeamObj = TEAMS[match.away];

                if (!homeTeamObj || !awayTeamObj) return;

                const isSettled = match.status === "finished";
                const isPredicted = predictions[match.id] !== undefined;
                const homeScoreVal = isPredicted ? predictions[match.id].homeScore : (match.homeScore !== null ? match.homeScore : "-");
                const awayScoreVal = isPredicted ? predictions[match.id].awayScore : (match.awayScore !== null ? match.awayScore : "-");

                let badgeHtml = "";
                let cardBorder = "border-gray-800";

                // Prominent dynamic "Local Time" indicator
                let timeBadgeHtml = "";
                if (!isSettled) {
                    const localTimeStr = formatUserTime(match.utc);
                    const userShiftedDate = formatUserDateShift(match.utc, match.date);
                    
                    timeBadgeHtml = `
                        <div class="flex items-center gap-1.5 flex-wrap select-none justify-end">
                            <span class="bg-purple-600/15 text-purple-400 text-[10px] font-bold px-2 py-0.5 rounded-md border border-purple-500/10 flex items-center" title="Automatically converted to your local timezone">
                                <i class="fa-regular fa-clock mr-1 animate-pulse"></i>${localTimeStr} Local
                            </span>
                            ${userShiftedDate !== match.date ? `<span class="bg-rose-500/10 text-rose-400 text-[10px] font-bold px-2 py-0.5 rounded-md border border-rose-500/10">${userShiftedDate}</span>` : ''}
                        </div>
                    `;
                }

                if (isPredicted) {
                    badgeHtml = `
                        <div class="flex items-center gap-2">
                            <span class="bg-emerald-500/20 text-emerald-400 text-[10px] font-extrabold uppercase px-2.5 py-0.5 rounded-full border border-emerald-500/10 flex items-center gap-1"><i class="fa-solid fa-square-poll-horizontal"></i> Predicted</span>
                            ${timeBadgeHtml}
                        </div>
                    `;
                    cardBorder = "border-emerald-500/30 shadow-lg shadow-emerald-900/5";
                } else if (isSettled) {
                    badgeHtml = `<span class="bg-gray-800 text-gray-400 text-[10px] font-extrabold uppercase px-2.5 py-0.5 rounded-full">Official Result</span>`;
                } else {
                    badgeHtml = timeBadgeHtml;
                }

                const card = document.createElement("div");
                card.className = `bg-cardBg rounded-2xl p-4 sm:p-5 border ${cardBorder} flex flex-col justify-between space-y-4 hover:border-gray-700 transition duration-200 relative overflow-hidden`;

                card.innerHTML = `
                    <div class="flex items-center justify-between text-xs border-b border-gray-800/40 pb-2">
                        <span class="text-gray-400 font-bold uppercase tracking-wide">Group ${match.group}</span>
                        <div class="flex items-center gap-2">
                            ${badgeHtml}
                            ${(isPredicted && !isSettled) ? `
                                <button onclick="clearSinglePrediction(${match.id})" class="text-rose-400 hover:text-rose-300 transition text-[10px] font-bold uppercase tracking-wide flex items-center gap-1 bg-rose-500/10 px-2 py-0.5 rounded-md" title="Reset Prediction">
                                    <i class="fa-solid fa-xmark"></i> Clear
                                </button>
                            ` : ''}
                        </div>
                    </div>

                    <!-- Spacious Horizontal Row for Teams & Score -->
                    <div class="flex items-center justify-between gap-2 py-1">
                        <!-- Home Team (Left Aligned) -->
                        <div class="flex items-center gap-2.5 sm:gap-3 w-[40%] justify-start overflow-hidden">
                            <span class="text-2xl sm:text-3xl shrink-0 filter drop-shadow select-none">${homeTeamObj.flag}</span>
                            <span class="font-bold text-sm sm:text-base text-white truncate" title="${homeTeamObj.name}">${homeTeamObj.name}</span>
                        </div>

                        <!-- Scorebox Display (Centered) -->
                        <div class="flex flex-col items-center justify-center w-[20%] shrink-0">
                            <div class="text-base sm:text-lg font-black text-white tracking-widest bg-gray-950/90 px-3 py-1.5 rounded-xl border border-gray-800 min-w-[60px] text-center shadow-inner">
                                ${homeScoreVal} : ${awayScoreVal}
                            </div>
                        </div>

                        <!-- Away Team (Right Aligned) -->
                        <div class="flex items-center gap-2.5 sm:gap-3 w-[40%] justify-end text-right overflow-hidden">
                            <span class="font-bold text-sm sm:text-base text-white truncate" title="${awayTeamObj.name}">${awayTeamObj.name}</span>
                            <span class="text-2xl sm:text-3xl shrink-0 filter drop-shadow select-none">${awayTeamObj.flag}</span>
                        </div>
                    </div>

                    <!-- Prediction Controls (Only shown for active, non-settled matches) -->
                    ${!isSettled ? `
                        <div class="flex items-center justify-between px-2 bg-gray-950/40 rounded-xl p-2 border border-gray-900/60 mt-1">
                            <!-- Home Prediction Clicker -->
                            <div class="flex items-center space-x-1.5 justify-start w-[45%]">
                                <button onclick="adjustPrediction(${match.id}, 'home', -1)" class="bg-gray-800 hover:bg-gray-700 active:scale-95 text-white font-extrabold text-xs w-6.5 h-6.5 rounded-lg border border-gray-700 transition flex items-center justify-center shadow" title="Minus 1">-</button>
                                <span class="text-[10px] text-gray-400 font-semibold px-0.5">Score</span>
                                <button onclick="adjustPrediction(${match.id}, 'home', 1)" class="bg-gray-800 hover:bg-emerald-600 active:scale-95 text-white font-extrabold text-xs w-6.5 h-6.5 rounded-lg border border-gray-700 transition flex items-center justify-center shadow" title="Plus 1">+</button>
                            </div>
                            
                            <!-- Contextual Cue Label -->
                            <span class="text-[9px] text-cupGold/90 font-extrabold tracking-wider uppercase shrink-0 text-center px-1">Prediction</span>

                            <!-- Away Prediction Clicker -->
                            <div class="flex items-center space-x-1.5 justify-end w-[45%]">
                                <button onclick="adjustPrediction(${match.id}, 'away', -1)" class="bg-gray-800 hover:bg-gray-700 active:scale-95 text-white font-extrabold text-xs w-6.5 h-6.5 rounded-lg border border-gray-700 transition flex items-center justify-center shadow" title="Minus 1">-</button>
                                <span class="text-[10px] text-gray-400 font-semibold px-0.5">Score</span>
                                <button onclick="adjustPrediction(${match.id}, 'away', 1)" class="bg-gray-800 hover:bg-emerald-600 active:scale-95 text-white font-extrabold text-xs w-6.5 h-6.5 rounded-lg border border-gray-700 transition flex items-center justify-center shadow" title="Plus 1">+</button>
                            </div>
                        </div>
                    ` : ''}

                    <!-- Stadium Footer info with Non-prominent Venue Time -->
                    <div class="border-t border-gray-800/40 pt-2.5 flex flex-wrap items-center justify-between text-[11px] text-gray-500 gap-1">
                        <span class="truncate max-w-[170px]" title="${match.stadium}"><i class="fa-solid fa-location-dot text-gray-600 mr-1"></i>${match.stadium}</span>
                        <span class="font-medium text-gray-400 flex items-center gap-1.5">
                            <span>${match.city}</span>
                            <span class="text-gray-700">|</span>
                            <span class="text-gray-500" title="Local kickoff clock at the venue venue"><i class="fa-regular fa-clock text-gray-600 mr-0.5"></i>${match.time} Venue</span>
                        </span>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function recalculateStandings() {
            Object.keys(TEAMS).forEach(key => {
                TEAMS[key].pts = 0;
                TEAMS[key].w = 0;
                TEAMS[key].d = 0;
                TEAMS[key].l = 0;
                TEAMS[key].gf = 0;
                TEAMS[key].ga = 0;
                TEAMS[key].gd = 0;
            });

            fixtures.forEach(match => {
                const pred = predictions[match.id];
                const isPredicted = pred !== undefined;

                let hScore = isPredicted ? pred.homeScore : match.homeScore;
                let aScore = isPredicted ? pred.awayScore : match.awayScore;

                if (hScore !== null && aScore !== null) {
                    const home = TEAMS[match.home];
                    const away = TEAMS[match.away];

                    if (home && away) {
                        home.gf += hScore;
                        home.ga += aScore;
                        home.gd = home.gf - home.ga;

                        away.gf += aScore;
                        away.ga += hScore;
                        away.gd = away.gf - away.ga;

                        if (hScore > aScore) {
                            home.w += 1;
                            home.pts += 3;
                            away.l += 1;
                        } else if (hScore < aScore) {
                            away.w += 1;
                            away.pts += 3;
                            home.l += 1;
                        } else {
                            home.d += 1;
                            home.pts += 1;
                            away.d += 1;
                            away.pts += 1;
                        }
                    }
                }
            });

            renderGroups();
        }

        function getSortedGroupTeams(groupLetter) {
            const groupTeams = Object.keys(TEAMS)
                .map(key => ({ code: key, ...TEAMS[key] }))
                .filter(t => t.group === groupLetter);

            return groupTeams.sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                if (b.gd !== a.gd) return b.gd - a.gd;
                return b.gf - a.gf;
            });
        }

        function renderGroups() {
            const container = document.getElementById("groupStandingsGrid");
            container.innerHTML = "";

            const groups = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
            
            const searchInput = document.getElementById("groupSearch").value.trim().toLowerCase();
            const groupFilter = document.getElementById("groupLetterFilter").value;

            groups.forEach(letter => {
                if (groupFilter !== "ALL" && groupFilter !== letter) return;

                const sortedTeams = getSortedGroupTeams(letter);

                if (searchInput) {
                    const matchesSearch = sortedTeams.some(team => team.name.toLowerCase().includes(searchInput));
                    if (!matchesSearch && !`group ${letter}`.toLowerCase().includes(searchInput)) return;
                }

                if (sortedTeams.length === 0) return;

                const groupCard = document.createElement("div");
                groupCard.className = "bg-cardBg rounded-3xl border border-gray-800 p-5 shadow-xl space-y-4 hover:border-gray-700 transition duration-300";
                
                let rowsHtml = "";
                sortedTeams.forEach((team, index) => {
                    const highlightClass = index < 2 ? "bg-emerald-500/5 text-emerald-400 font-semibold" : "";
                    const rankBadge = index < 2 
                        ? `<span class="bg-emerald-500/15 text-emerald-400 text-[10px] px-1.5 py-0.5 rounded-md font-extrabold">Q</span>` 
                        : `<span class="text-gray-500 text-[10px]">${index + 1}</span>`;

                    rowsHtml += `
                        <tr class="text-xs hover:bg-gray-800/30 transition ${highlightClass}">
                            <td class="py-2.5 px-2 text-center">${rankBadge}</td>
                            <td class="py-2.5 px-2 flex items-center gap-2">
                                <span class="text-lg filter drop-shadow select-none">${team.flag}</span>
                                <span class="font-bold text-white truncate max-w-[110px]" title="${team.name}">${team.name}</span>
                            </td>
                            <td class="py-2.5 px-2 text-center font-bold text-white">${team.pts}</td>
                            <td class="py-2.5 px-2 text-center text-gray-400">${team.w}</td>
                            <td class="py-2.5 px-2 text-center text-gray-400">${team.d}</td>
                            <td class="py-2.5 px-2 text-center text-gray-400">${team.l}</td>
                            <td class="py-2.5 px-2 text-center text-gray-400">${team.gf}</td>
                            <td class="py-2.5 px-2 text-center text-gray-400">${team.ga}</td>
                            <td class="py-2.5 px-2 text-right font-semibold text-gray-300">${team.gd > 0 ? '+' + team.gd : team.gd}</td>
                        </tr>
                    `;
                });

                groupCard.innerHTML = `
                    <div class="flex items-center justify-between border-b border-gray-800 pb-3">
                        <h4 class="text-sm font-extrabold text-white tracking-tight">GROUP ${letter}</h4>
                        <span class="text-[10px] text-gray-500 bg-gray-900 px-2 py-0.5 rounded-md">Projected Standings</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="text-[10px] uppercase font-extrabold text-gray-500 tracking-wider border-b border-gray-800/60">
                                    <th class="py-2 px-1 text-center">#</th>
                                    <th class="py-2 px-2">Team</th>
                                    <th class="py-2 px-2 text-center">Pts</th>
                                    <th class="py-2 px-2 text-center">W</th>
                                    <th class="py-2 px-2 text-center">D</th>
                                    <th class="py-2 px-2 text-center">L</th>
                                    <th class="py-2 px-2 text-center">GF</th>
                                    <th class="py-2 px-2 text-center">GA</th>
                                    <th class="py-2 px-2 text-right">GD</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rowsHtml}
                            </tbody>
                        </table>
                    </div>
                `;

                container.appendChild(groupCard);
            });
        }

        function filterGroups() {
            renderGroups();
        }

async function fetchRealWorldResults() {
            try {
                // Wrap the target URL in a free CORS proxy (AllOrigins) to bypass browser restrictions
                const targetUrl = encodeURIComponent('https://worldcup26.ir/get/games');
                const proxyUrl = `https://api.allorigins.win/raw?url=${targetUrl}`;

                const response = await fetch(proxyUrl, {
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) throw new Error('API server or proxy unreachable');
                
                const remoteGames = await response.json();
                if (!Array.isArray(remoteGames)) return;

                let stateUpdated = false;

                remoteGames.forEach(game => {
                    // Match remote API ID or teams
                    const matchIndex = fixtures.findIndex(f => 
                        f.id === game.id || (f.home === game.home_team && f.away === game.away_team)
                    );

                    if (matchIndex !== -1) {
                        const localGame = fixtures[matchIndex];
                        
                        // Check if scores have changed on finished or active games
                        const remoteFinished = game.status?.toLowerCase() === 'finished' || game.status?.toLowerCase() === 'ft';
                        const scoreChanged = game.home_score !== localGame.homeScore || game.away_score !== localGame.awayScore;
                        const statusChanged = (remoteFinished && localGame.status !== 'finished');

                        if (scoreChanged || statusChanged) {
                            localGame.homeScore = game.home_score;
                            localGame.awayScore = game.away_score;
                            if (remoteFinished) {
                                localGame.status = 'finished';
                                // Strip local predictions overrides if the game settles officially
                                if (predictions[localGame.id]) {
                                    delete predictions[localGame.id];
                                }
                            }
                            stateUpdated = true;
                        }
                    }
                });

                if (stateUpdated) {
                    recalculateStandings();
                    renderMatches();
                }
            } catch (err) {
                console.warn('Silent sync warning (Falling back to local predictions model):', err.message);
            }
        }
        // Initialize State on DOM load
        window.onload = function() {
            initTabs();
            recalculateStandings();
            renderMatches();

            // Run first fetch, then set background interval for every 5 minutes (300,000ms)
            fetchRealWorldResults();
            setInterval(fetchRealWorldResults, 300000);
        }
    </script>
</body>
